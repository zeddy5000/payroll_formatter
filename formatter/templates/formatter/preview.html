<!DOCTYPE html>
<html>

<head>

    <title>Payroll Preview</title>

    <style>

        body{
            font-family: Arial;
            padding:20px;
        }

        table{
            border-collapse: collapse;
            width:100%;
        }

        th,td{
            border:1px solid #ddd;
            padding:8px;
        }

        th{
            background:#f5f5f5;
        }

        .btn{
            display:inline-block;
            padding:10px 16px;
            margin-right:10px;
            text-decoration:none;
            background:#2563eb;
            color:white;
            border-radius:4px;
        }

        .actions{
            margin-bottom:20px;
        }

    </style>

</head>

<body>

<h1>Payroll Preview</h1>

<div class="actions">

    <a
        href="{% url 'download_csv' file_id %}"
        class="btn"
    >
        Download CSV
    </a>

    <a
        href="{% url 'download_xlsx' file_id %}"
        class="btn"
    >
        Download XLSX
    </a>

    <a
        href="{% url 'download_xls' file_id %}"
        class="btn"
    >
        Download XLS
    </a>

</div>

{{ preview|safe }}

</body>

</html>
